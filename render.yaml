# businessbot.kg — WhatsApp AI (веб-версия для Render.com)

Полноценный веб-сайт: пользователи регистрируются (логин/пароль), подтверждают
аккаунт кодом из 6 символов, выбирают срок действия (1 месяц / 1 год), заходят,
подключают **реальный WhatsApp** через QR прямо на сайте (интерфейс в стиле
WhatsApp), а ИИ отвечает клиентам автоматически на **3 языках** — английский,
кыргызский, русский — в зависимости от языка клиента. Все чаты и сообщения
сохраняются в базе данных **навсегда**, даже если их удалят в WhatsApp.

---

## 0. Что внутри (архитектура)

```
render-app/
  src/
    server.js     — Express + Socket.io + маршруты API
    db.js         — Postgres: users, verify_codes, chats, messages
    auth.js       — регистрация / код / вход, bcrypt + JWT
    mailer.js     — отправка кода через Gmail SMTP
    ai.js         — облачный ИИ (OpenAI-совместимый), трёхъязычные ответы
    lang.js       — определение языка (EN / KY / RU, кириллица и латиница)
    whatsapp.js   — whatsapp-web.js по одному клиенту на пользователя
  public/         — фронтенд в стиле WhatsApp (index.html, app.js, styles.css)
  Dockerfile      — образ с Chromium для WhatsApp
  render.yaml     — авто-настройка Render (веб + база + диск)
  .env.example    — список переменных окружения
```

## Защита от взлома (уже встроено)
- Пароли хранятся как **bcrypt-хеш** (12 раундов), не в открытом виде.
- Сессии — **JWT в httpOnly cookie** (JS не может украсть токен).
- **helmet** + строгий Content-Security-Policy.
- **rate-limit**: 30 запросов/15 мин на вход/регистрацию (защита от перебора).
- Код подтверждения истекает через 15 минут, максимум 5 попыток.
- Валидация всех входных данных через **zod**.
- Каждый пользователь видит **только свои** чаты (изоляция по user_id).

## Защита от плагиата / копирования
- Весь ИИ и WhatsApp работают **на сервере**, в браузер логика не отдаётся.
- Ключи (ИИ, почта, БД) хранятся только в переменных окружения Render, их
  нельзя вытащить из скачанного фронтенда.
- Доступ к боту закрыт логином/паролем + подтверждением по коду, который
  приходит **тебе** на kgbusinessbot@gmail.com — без твоего кода никто не
  активирует аккаунт. То есть ты лично контролируешь, кто получит доступ.

---

## 1. Подготовка ключей (сделай один раз)

### 1.1 Gmail App Password (для отправки кода)
1. Включи 2FA: https://myaccount.google.com/security
2. Открой https://myaccount.google.com/apppasswords
3. Создай пароль приложения «businessbot» → получишь 16 символов.
4. Запомни: `GMAIL_USER` = твой gmail, `GMAIL_APP_PASSWORD` = эти 16 символов.

### 1.2 Облачный ИИ (бесплатно, эффективно) — Groq
1. Зарегистрируйся: https://console.groq.com
2. Создай API key → он начинается с `gsk_...`
3. Это `AI_API_KEY`. Модель по умолчанию `llama-3.3-70b-versatile` (быстрая,
   бесплатная, хорошо говорит на русском и английском).
> Можно любой OpenAI-совместимый сервис — просто поменяй `AI_BASE_URL` и `AI_MODEL`.

---

## 2. Загрузка на Render.com

### Вариант A — через GitHub (рекомендую, авто-настройка)
1. Скачай zip проекта, распакуй.
2. Залей папку `render-app` в новый репозиторий GitHub.
3. На https://render.com → **New → Blueprint** → выбери свой репозиторий.
   Render прочитает `render.yaml` и сам создаст **веб-сервис + базу Postgres + диск**.
4. В настройках сервиса заполни секреты (значения из шага 1):
   `GMAIL_USER`, `GMAIL_APP_PASSWORD`, `AI_API_KEY`.
   (`JWT_SECRET`, `DATABASE_URL` создаются автоматически.)
5. Нажми **Deploy**. Готово — открывай URL сайта.

### Вариант B — вручную
1. Render → **New → Web Service** → Build from repo/Docker.
2. Environment: **Docker** (используется наш `Dockerfile`).
3. Создай отдельно **New → PostgreSQL** (free), скопируй его `Internal Database URL`.
4. В Environment переменных веб-сервиса добавь всё из `.env.example`
   (`DATABASE_URL`, `JWT_SECRET`, `GMAIL_USER`, `GMAIL_APP_PASSWORD`,
   `CODE_INBOX`, `AI_BASE_URL`, `AI_API_KEY`, `AI_MODEL`,
   `PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium`, `WA_SESSION_DIR=/app/.wa-sessions`).
5. Добавь **Disk** (mount `/app/.wa-sessions`, 1 GB) — чтобы WhatsApp не просил
   QR после каждого рестарта.
6. Deploy.

---

## 3. Про «бесплатно и не засыпает» — честно

Бесплатного плана, где реальный WhatsApp работает 24/7 и не засыпает,
**не существует** ни у кого (нужен постоянный процесс с браузером в памяти).

Варианты по деньгам:
- **Render Starter (~$7/мес)** — стабильно, WhatsApp не отваливается. Рекомендую.
- **Render Free** — работает, но сервис засыпает через 15 мин без трафика и при
  пробуждении теряет сессию WhatsApp (частый повторный QR). Как обойти бесплатно:
  настрой пинг каждые 10 минут на https://uptimerobot.com (бесплатно) — сервис
  не уснёт. Диск на free-плане недоступен, поэтому сессия всё равно может
  сбрасываться при передеплое.
- **Альтернативы** с щедрым бесплатным лимитом: Fly.io, Railway — тот же
  Dockerfile подойдёт.

> Демо/UI и вход работают на любом плане. Ограничение касается только живого
> подключения WhatsApp.

---

## 4. Локальный запуск (проверить перед заливкой)

```bash
cd render-app
cp .env.example .env      # заполни значения
npm install
npm start                 # http://localhost:3000
```
Нужен локальный Postgres и установленный Chromium (или поправь
`PUPPETEER_EXECUTABLE_PATH`).

---

## 5. Как этим пользоваться

1. Пользователь заходит на сайт → **Регистрация** (логин, email, пароль, ниша).
2. Тебе на **kgbusinessbot@gmail.com** приходит письмо с кодом из 6 символов.
3. Ты передаёшь код пользователю → он вводит его и выбирает срок (1 мес / 1 год).
4. Аккаунт активирован, пользователь входит.
5. Нажимает **«Подключить WhatsApp»** → сканирует QR телефоном.
6. Теперь входящие сообщения клиентов сохраняются и ИИ отвечает сам на языке
   клиента. Оператор может выключить «Автопилот» в конкретном чате и писать вручную.
